<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GMS Smart Tracker Pro</title>
    
    <meta name="theme-color" content="#075E54">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22GMS%20Tracker%22,%22short_name%22:%22GMS%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#075E54%22,%22theme_color%22:%22#075E54%22}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --wa-green: #075E54;
            --wa-teal: #128C7E;
            --wa-bg: #e5ddd5; /* WhatsApp Wall Texture Background */
            --bubble-in: #ffffff;
            --bubble-out: #dcf8c6;
            --white: #ffffff;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--wa-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        /* Login Screen (Fixed Overlay) */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Header & Tab Navigation */
        header { background: var(--wa-green); color: white; flex-shrink: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; }
        .app-title { font-size: 20px; font-weight: 500; }
        .user-dp { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid white; object-fit: cover; }

        .tabs-nav { display: flex; background: var(--wa-green); position: relative; }
        .tab { 
            flex: 1; text-align: center; padding: 15px 0; color: rgba(255,255,255,0.7);
            font-weight: 500; font-size: 13px; text-transform: uppercase; cursor: pointer;
        }
        .tab.active { color: white; }
        .indicator {
            position: absolute; bottom: 0; left: 0; height: 3px; background: white;
            width: 33.33%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Main Content Slider */
        .swiper { width: 100%; flex: 1; }
        .swiper-slide { 
            height: 100%; overflow-y: auto; padding: 12px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        /* Input Card (Kitchen Tracker Style - TOP) */
        .input-card {
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
        }
        .wa-input {
            border: 1px solid #e0e0e0; padding: 12px; border-radius: 8px;
            font-size: 15px; outline: none; background: #f9f9f9; width: 100%; box-sizing: border-box;
        }
        .save-btn {
            background: var(--wa-teal); color: white; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px;
        }

        /* Data Rows (WhatsApp Bubbles) */
        .data-list { display: flex; flex-direction: column; gap: 10px; }
        .item-row {
            background: var(--bubble-in); padding: 10px 12px; border-radius: 8px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative;
            max-width: 90%; align-self: flex-start; min-width: 150px;
        }
        .item-row.query-bubble { background: var(--bubble-out); align-self: flex-end; }

        .item-content { font-size: 15px; color: #262626; line-height: 1.4; word-wrap: break-word; }
        .item-meta { 
            font-size: 10px; color: #888; text-align: right; margin-top: 5px; 
            display: block; font-weight: 500;
        }

        /* Password Table Style within Row */
        .pass-info-row {
            border-bottom: 1px solid #f0f0f0; padding: 8px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .pass-info-row:last-of-type { border-bottom: none; }
        .label { color: #888; font-size: 11px; display: block; }
        .val { font-size: 14px; font-family: 'Courier New', Courier, monospace; }
        .icon-btn { color: var(--wa-teal); cursor: pointer; padding: 6px; font-size: 16px; }

        .btn-footer { margin-top: 8px; padding-top: 6px; border-top: 1px solid #eee; display: flex; gap: 15px; }
        .action-link { background: none; border: none; font-size: 12px; font-weight: bold; cursor: pointer; color: #d9534f; }
        .done-link { color: var(--wa-teal); }

    </style>
</head>
<body>

    <div id="login-screen">
        <i class="fab fa-whatsapp" style="font-size: 80px; color: #25D366; margin-bottom: 15px;"></i>
        <h1 style="margin: 0; color: #444; font-size: 24px;">GMS Tracker</h1>
        <p style="color: #888; margin-bottom: 30px;">Syncing your real-time data</p>
        <button id="google-login-btn" style="background:#4285F4; color:white; border:none; padding:14px 28px; border-radius:5px; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:10px;">
            <i class="fab fa-google"></i> CONTINUE WITH GOOGLE
        </button>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <div class="top-bar">
                <div class="app-title">GMS Tracker</div>
                <img id="user-dp" class="user-dp" src="" alt="">
            </div>
            <div class="tabs-nav">
                <div class="tab active" onclick="jumpTo(0)">Queries</div>
                <div class="tab" onclick="jumpTo(1)">Passwords</div>
                <div class="tab" onclick="jumpTo(2)">Notes</div>
                <div class="indicator" id="tab-line"></div>
            </div>
        </header>

        <div class="swiper">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide">
                    <div class="input-card">
                        <input type="text" id="q-field" class="wa-input" placeholder="Enter your query...">
                        <button class="save-btn" onclick="saveToFirebase('queries')">SAVE QUERY</button>
                    </div>
                    <div id="queries-list" class="data-list"></div>
                </div>

                <div class="swiper-slide">
                    <div class="input-card">
                        <input type="text" id="p-title" class="wa-input" placeholder="Service Name (e.g. Gmail)">
                        <input type="text" id="p-user" class="wa-input" placeholder="Username/Email">
                        <input type="text" id="p-pass" class="wa-input" placeholder="Password">
                        <button class="save-btn" onclick="saveToFirebase('passwords')">SAVE PASSWORD</button>
                    </div>
                    <div id="passwords-list" class="data-list"></div>
                </div>

                <div class="swiper-slide">
                    <div class="input-card">
                        <textarea id="n-field" class="wa-input" style="height: 80px;" placeholder="Write a note..."></textarea>
                        <button class="save-btn" onclick="saveToFirebase('notes')">SAVE NOTE</button>
                    </div>
                    <div id="notes-list" class="data-list"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your Firebase Config (Corrected per your request)
        const firebaseConfig = {
            apiKey: "AIzaSyBt8gP3y2M3tjabKwjNfiotgqmxmhIq7cI",
            authDomain: "encryption-cb1d7.firebaseapp.com",
            databaseURL: "https://encryption-cb1d7-default-rtdb.firebaseio.com",
            projectId: "encryption-cb1d7",
            storageBucket: "encryption-cb1d7.firebasestorage.app",
            messagingSenderId: "341148500717",
            appId: "1:341148500717:web:08c39bd1dbd2b672ab42e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let swiperInstance, currentUserID;

        // --- AUTH LOGIC & PERSISTENCE ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserID = user.uid;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-dp').src = user.photoURL;
                setupApp();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);

        function setupApp() {
            // Initialize Swiper for Sliding
            swiperInstance = new Swiper('.swiper', {
                speed: 350,
                resistanceRatio: 0.5,
                on: { slideChange: () => handleTabUI(swiperInstance.activeIndex) }
            });

            // Start Syncing Paths
            ['queries', 'passwords', 'notes'].forEach(path => syncPath(path));
        }

        window.jumpTo = (idx) => swiperInstance.slideTo(idx);

        function handleTabUI(idx) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.getElementById('tab-line').style.transform = `translateX(${idx * 100}%)`;
        }

        // --- SYNC & LOCAL STORAGE ---
        function syncPath(path) {
            // 1. Instant load from LocalStorage
            const cache = localStorage.getItem(`gms_cache_${currentUserID}_${path}`);
            if (cache) renderData(path, JSON.parse(cache));

            // 2. Real-time Firebase Sync
            onValue(ref(db, `users/${currentUserID}/${path}`), (snap) => {
                const data = snap.val() || {};
                localStorage.setItem(`gms_cache_${currentUserID}_${path}`, JSON.stringify(data));
                renderData(path, data);
            });
        }

        // --- SAVE DATA ---
        window.saveToFirebase = (path) => {
            let payload = { 
                ts: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 
                dt: new Date().toLocaleDateString('en-GB') 
            };
            
            if(path === 'queries') {
                const val = document.getElementById('q-field').value.trim();
                if(!val) return; payload.content = val;
                document.getElementById('q-field').value = '';
            } else if(path === 'notes') {
                const val = document.getElementById('n-field').value.trim();
                if(!val) return; payload.content = val;
                document.getElementById('n-field').value = '';
            } else if(path === 'passwords') {
                const title = document.getElementById('p-title').value.trim();
                const user = document.getElementById('p-user').value.trim();
                const pass = document.getElementById('p-pass').value.trim();
                if(!title || !pass) return;
                payload = { ...payload, title, user, pass };
                document.getElementById('p-title').value = '';
                document.getElementById('p-user').value = '';
                document.getElementById('p-pass').value = '';
            }
            push(ref(db, `users/${currentUserID}/${path}`), payload);
        };

        window.removeItem = (path, key) => confirm("Remove permanently?") && remove(ref(db, `users/${currentUserID}/${path}/${key}`));

        // --- RENDER UI ---
        function renderData(path, data) {
            const listElement = document.getElementById(`${path}-list`);
            listElement.innerHTML = '';
            
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                const row = document.createElement('div');
                row.className = `item-row ${path === 'queries' ? 'query-bubble' : ''}`;
                
                if(path === 'passwords') {
                    row.innerHTML = `
                        <b style="color:var(--wa-green); font-size:16px;">${item.title}</b>
                        <div class="pass-info-row">
                            <div><span class="label">Username</span><span class="val" id="u-${key}">${item.user || 'N/A'}</span></div>
                            <i class="fas fa-copy icon-btn" onclick="copyTxt('u-${key}')"></i>
                        </div>
                        <div class="pass-info-row">
                            <div><span class="label">Password</span><span class="val" id="p-${key}">••••••••</span></div>
                            <div style="display:flex;">
                                <i class="fas fa-eye icon-btn" onclick="document.getElementById('p-${key}').innerText='${item.pass}'"></i>
                                <i class="fas fa-key icon-btn" onclick="copyDirect('${item.pass}')"></i>
                            </div>
                        </div>
                        <span class="item-meta">${item.dt} at ${item.ts}</span>
                        <div class="btn-footer"><button class="action-link" onclick="removeItem('passwords','${key}')">DELETE</button></div>
                    `;
                } else {
                    row.innerHTML = `
                        <div class="item-content">${item.content}</div>
                        <span class="item-meta">${item.dt} at ${item.ts}</span>
                        <div class="btn-footer">
                            ${path==='queries' ? `<button class="action-link done-link" onclick="removeItem('queries','${key}')">DONE</button>` : `<button class="action-link" onclick="removeItem('notes','${key}')">REMOVE</button>`}
                        </div>
                    `;
                }
                listElement.appendChild(row);
            });
        }

        // --- HELPERS ---
        window.copyTxt = (id) => { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("Copied!"); }
        window.copyDirect = (val) => { navigator.clipboard.writeText(val); alert("Password Copied!"); }

    </script>
</body>
</html>
