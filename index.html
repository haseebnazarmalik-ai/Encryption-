<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28a745">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/508/508281.png">

    <title>Haseeb Secure Vault - Notes & Passwords</title>
    <meta name="description" content="Haseeb's Secure Personal Vault for managing private notes and passwords with Firebase encryption.">
    <meta name="keywords" content="Haseeb Vault, Password Manager, Secure Notes, GitHub Vault">
    <meta name="author" content="Haseeb Nazar Malik">
    <meta name="robots" content="index, follow">

    <style>
        :root { --primary: #28a745; --google: #4285f4; --danger: #dc3545; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 10px; }
        .hidden { display: none; }
        h2 { text-align: center; color: var(--dark); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-google { background: white; color: #757575; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-buttons button { background: #eee; color: #555; }
        .tab-buttons button.active { background: var(--primary); color: white; }
        
        .card { background: #f9f9f9; padding: 15px; margin-top: 15px; border-radius: 10px; border-left: 5px solid var(--primary); position: relative; }
        .pass-card { border-left-color: var(--google); background: #eef5ff; }
        .card b { font-size: 14px; color: #555; }
        .data-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; background: rgba(255,255,255,0.8); padding: 5px 8px; border-radius: 5px; border: 1px solid #eee; }
        
        .action-btn { cursor: pointer; font-size: 18px; background: none; border: none; padding: 5px; width: auto; margin: 0; }
        .copy-icon { color: var(--google); }
        .del-icon { color: var(--danger); position: absolute; top: 10px; right: 10px; }
        .logout-btn { background: var(--danger); color: white; margin-top: 25px; }
        .divider { text-align: center; margin: 15px 0; border-bottom: 1px solid #ddd; line-height: 0.1em; }
        .divider span { background: #fff; padding: 0 10px; color: #999; }
    </style>
</head>
<body>

<div class="container" id="auth-container">
    <h2>Vault Login</h2>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button class="btn-primary" onclick="handleEmailAuth()">Login / Sign Up</button>
    <div class="divider"><span>OR</span></div>
    <button class="btn-google" onclick="handleGoogleAuth()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Continue with Google
    </button>
</div>

<div class="container hidden" id="main-app">
    <div class="tab-buttons">
        <button onclick="showTab('notes')" id="btn-notes" class="active">Notes</button>
        <button onclick="showTab('passwords')" id="btn-pass">Passwords</button>
    </div>

    <div id="section-notes">
        <input type="text" id="note-title" placeholder="Note Title">
        <textarea id="note-body" rows="3" placeholder="Note content..."></textarea>
        <button class="btn-primary" onclick="saveData('notes')">Save Note</button>
        <div id="notes-list"></div>
    </div>

    <div id="section-passwords" class="hidden">
        <input type="text" id="site-name" placeholder="Website/App Name">
        <input type="text" id="site-user" placeholder="Username / Email">
        <input type="text" id="site-pass" placeholder="Password">
        <button class="btn-primary" onclick="saveData('passwords')">Save Password</button>
        <div id="pass-list"></div>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script type="module">
    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW Registered'))
            .catch(err => console.log('SW Registration Failed', err));
        });
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBt8gP3y2M3tjabKwjNfiotgqmxmhIq7cI",
        authDomain: "encryption-cb1d7.firebaseapp.com",
        projectId: "encryption-cb1d7",
        storageBucket: "encryption-cb1d7.firebasestorage.app",
        messagingSenderId: "341148500717",
        appId: "1:341148500717:web:08c39bd1dbd2b672ab42e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    let currentUser = null;

    // --- Auth Functions ---
    window.handleEmailAuth = async () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        if(!email || !pass) return alert("Fill all fields");
        try { await signInWithEmailAndPassword(auth, email, pass); } 
        catch (e) { 
            if(e.code.includes('user-not-found') || e.code.includes('invalid-credential')) {
                await createUserWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
            } else alert(e.message);
        }
    };

    window.handleGoogleAuth = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, user => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            loadData('notes'); loadData('passwords');
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    // --- Core Functions ---
    window.saveData = async (type) => {
        const data = type === 'notes' ? {
            title: document.getElementById('note-title').value,
            body: document.getElementById('note-body').value
        } : {
            site: document.getElementById('site-name').value,
            user: document.getElementById('site-user').value,
            pass: document.getElementById('site-pass').value
        };

        if(Object.values(data).some(v => !v)) return alert("Please fill all fields");

        await addDoc(collection(db, type), { ...data, uid: currentUser.uid, ts: Date.now() });
        document.querySelectorAll(`#section-${type} input, #section-${type} textarea`).forEach(i => i.value = '');
    };

    window.deleteItem = async (type, id) => {
        if(confirm("Delete this item?")) await deleteDoc(doc(db, type, id));
    };

    window.copyText = (text) => {
        navigator.clipboard.writeText(text);
        alert("Copied!");
    };

    function loadData(type) {
        const q = query(collection(db, type), where("uid", "==", currentUser.uid));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById(type === 'notes' ? 'notes-list' : 'pass-list');
            list.innerHTML = '';
            snapshot.forEach(res => {
                const item = res.data();
                const id = res.id;
                const div = document.createElement('div');
                div.className = `card ${type === 'passwords' ? 'pass-card' : ''}`;
                
                if(type === 'notes') {
                    div.innerHTML = `
                        <button class="action-btn del-icon" onclick="deleteItem('notes','${id}')">🗑️</button>
                        <b>${item.title}</b>
                        <div class="data-row">
                            <span>${item.body}</span>
                            <button class="action-btn copy-icon" onclick="copyText('${item.body}')">📋</button>
                        </div>`;
                } else {
                    div.innerHTML = `
                        <button class="action-btn del-icon" onclick="deleteItem('passwords','${id}')">🗑️</button>
                        <center><b style="color:var(--google)">${item.site}</b></center>
                        <b>User:</b>
                        <div class="data-row">
                            <span>${item.user}</span>
                            <button class="action-btn copy-icon" onclick="copyText('${item.user}')">📋</button>
                        </div>
                        <b>Pass:</b>
                        <div class="data-row">
                            <span>${item.pass}</span>
                            <button class="action-btn copy-icon" onclick="copyText('${item.pass}')">📋</button>
                        </div>`;
                }
                list.appendChild(div);
            });
        });
    }

    window.showTab = (tab) => {
        document.getElementById('section-notes').classList.toggle('hidden', tab !== 'notes');
        document.getElementById('section-passwords').classList.toggle('hidden', tab !== 'passwords');
        document.getElementById('btn-notes').classList.toggle('active', tab === 'notes');
        document.getElementById('btn-pass').classList.toggle('active', tab === 'passwords');
    };
</script>
</body>
</html>
