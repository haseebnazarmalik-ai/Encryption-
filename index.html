<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>v1.5 - Secure Vault</title>
    <style>
        :root { --primary: #28a745; --google: #4285f4; --danger: #dc3545; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        
        /* Fixed Header Bar */
        .status-bar { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .user-photo { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; }

        .container { width: 90%; max-width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 20px auto; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-google { background: white; color: #757575; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .tab-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-buttons button { background: #eee; color: #555; }
        .tab-buttons button.active { background: var(--primary); color: white; }

        /* Card Styling Fix */
        .card { background: #f9f9f9; padding: 15px; margin-top: 15px; border-radius: 10px; border-left: 5px solid var(--primary); position: relative; }
        .pass-card { border-left-color: var(--google); background: #f0f7ff; }
        
        /* Trash Icon on Right */
        .del-icon { position: absolute; right: 10px; top: 10px; color: var(--danger); font-size: 20px; cursor: pointer; background: none; border: none; width: auto; padding: 5px; }
        
        .data-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .timestamp { font-size: 10px; color: #888; display: block; margin-top: 10px; text-align: right; }
        .action-btn { cursor: pointer; font-size: 18px; border: none; background: none; padding: 0 5px; }
        .pass-input { border: none; background: transparent; font-size: 16px; width: 60%; color: #333; outline: none; }
        .logout-btn { background: var(--danger); color: white; margin-top: 25px; }
    </style>
</head>
<body>

<div id="dashboard-bar" class="status-bar hidden">
    <div class="user-info"><span id="welcome-text">Hi, User</span></div>
    <img id="user-pfp" class="user-photo" src="" alt="DP">
</div>

<div class="container" id="auth-container">
    <h2 style="text-align:center">Vault Login</h2>
    <input type="email" id="login-email" placeholder="Email Address">
    <input type="password" id="login-pass" placeholder="Password">
    <button class="btn-primary" onclick="handleLogin()">Login</button>
    <div style="text-align:center; margin:15px 0; color:#999">OR</div>
    <button class="btn-google" onclick="handleGoogleAuth()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Continue with Google
    </button>
</div>

<div class="container hidden" id="main-app">
    <div class="tab-buttons">
        <button onclick="showTab('notes')" id="btn-notes" class="active">Notes</button>
        <button onclick="showTab('passwords')" id="btn-pass">Passwords</button>
    </div>

    <div id="section-notes">
        <input type="text" id="note-title" placeholder="Note Title (Optional)">
        <textarea id="note-body" rows="3" placeholder="Write note..."></textarea>
        <button class="btn-primary" onclick="saveData('notes')">Save Note</button>
        <div id="notes-list"></div>
    </div>

    <div id="section-passwords" class="hidden">
        <input type="text" id="site-name" placeholder="Website/App Name">
        <input type="text" id="site-user" placeholder="Username / Email">
        <input type="text" id="site-pass" placeholder="Password">
        <button class="btn-primary" onclick="saveData('passwords')">Save Password</button>
        <div id="pass-list"></div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBt8gP3y2M3tjabKwjNfiotgqmxmhIq7cI",
        authDomain: "encryption-cb1d7.firebaseapp.com",
        projectId: "encryption-cb1d7",
        storageBucket: "encryption-cb1d7.firebasestorage.app",
        messagingSenderId: "341148500717",
        appId: "1:341148500717:web:08c39bd1dbd2b672ab42e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Direct Login Check (Prevents Login Screen Flash)
    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('dashboard-bar').classList.remove('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('welcome-text').innerText = `Hi, ${user.displayName || user.email.split('@')[0]}`;
            document.getElementById('user-pfp').src = user.photoURL || 'https://via.placeholder.com/35';
            loadData('notes', user.uid); loadData('passwords', user.uid);
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('dashboard-bar').classList.add('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    window.handleLogin = () => {
        const email = document.getElementById('login-email').value.trim();
        const pass = document.getElementById('login-pass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
    };

    window.handleGoogleAuth = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    window.saveData = async (type) => {
        const user = auth.currentUser;
        const data = type === 'notes' ? {
            title: document.getElementById('note-title').value || "Untitled",
            body: document.getElementById('note-body').value
        } : {
            site: document.getElementById('site-name').value,
            user: document.getElementById('site-user').value,
            pass: document.getElementById('site-pass').value
        };
        if(!data.body && type === 'notes') return alert("Empty!");
        await addDoc(collection(db, type), { 
            ...data, uid: user.uid, 
            date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
        document.querySelectorAll('input, textarea').forEach(i => i.value = '');
    };

    window.togglePass = (id) => {
        const el = document.getElementById('p-'+id);
        const icon = document.getElementById('i-'+id);
        el.type = (el.type === "password") ? "text" : "password";
        icon.innerText = (el.type === "password") ? "👁️" : "🔒";
    };

    function loadData(type, uid) {
        const q = query(collection(db, type), where("uid", "==", uid));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById(type === 'notes' ? 'notes-list' : 'pass-list');
            list.innerHTML = '';
            snapshot.forEach(res => {
                const item = res.data();
                const id = res.id;
                const div = document.createElement('div');
                div.className = `card ${type === 'passwords' ? 'pass-card' : ''}`;
                
                if(type === 'notes') {
                    div.innerHTML = `<button class="del-icon" onclick="deleteItem('notes','${id}')">🗑️</button>
                        <b style="color:var(--primary)">${item.title}</b>
                        <div class="data-row"><span>${item.body}</span><button class="action-btn" onclick="navigator.clipboard.writeText('${item.body}')">📋</button></div>
                        <span class="timestamp">${item.date} | ${item.time}</span>`;
                } else {
                    div.innerHTML = `<button class="del-icon" onclick="deleteItem('passwords','${id}')">🗑️</button>
                        <center><b style="color:var(--google)">${item.site}</b></center>
                        <small>User:</small>
                        <div class="data-row"><span>${item.user}</span><button class="action-btn" onclick="navigator.clipboard.writeText('${item.user}')">📋</button></div>
                        <small>Pass:</small>
                        <div class="data-row">
                            <input type="password" value="${item.pass}" id="p-${id}" class="pass-input" readonly>
                            <div><button class="action-btn" id="i-${id}" onclick="togglePass('${id}')">👁️</button>
                            <button class="action-btn" onclick="navigator.clipboard.writeText('${item.pass}')">📋</button></div>
                        </div>
                        <span class="timestamp">${item.date || 'undefined'} | ${item.time || 'undefined'}</span>`;
                }
                list.appendChild(div);
            });
        });
    }

    window.deleteItem = async (t, id) => { if(confirm("Delete?")) await deleteDoc(doc(db, t, id)); };
    window.showTab = (t) => {
        document.getElementById('section-notes').classList.toggle('hidden', t !== 'notes');
        document.getElementById('section-passwords').classList.toggle('hidden', t !== 'passwords');
        document.getElementById('btn-notes').classList.toggle('active', t === 'notes');
        document.getElementById('btn-pass').classList.toggle('active', t === 'passwords');
    };
</script>
</body>
</html>
