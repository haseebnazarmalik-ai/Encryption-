<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>v1.1 - Secure Vault</title>
    <style>
        :root { --primary: #28a745; --google: #4285f4; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 20px; }
        .hidden { display: none; }
        
        h2 { text-align: center; color: var(--dark); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-google { background: white; color: #757575; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:hover { background: #f1f1f1; }
        
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-buttons button { background: #eee; color: #555; margin: 0; }
        .tab-buttons button.active { background: var(--primary); color: white; }
        
        .card { background: #f9f9f9; padding: 15px; margin-top: 15px; border-radius: 10px; border-left: 5px solid var(--primary); position: relative; word-wrap: break-word; }
        .pass-card { border-left-color: var(--google); background: #eef5ff; }
        .logout-btn { background: #ff4d4d; color: white; margin-top: 30px; }
        
        .divider { text-align: center; margin: 20px 0; border-bottom: 1px solid #ddd; line-height: 0.1em; }
        .divider span { background: #fff; padding: 0 10px; color: #999; }
    </style>
</head>
<body>

<div class="container" id="auth-container">
    <h2>Vault Login</h2>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button class="btn-primary" onclick="handleEmailAuth()">Login / Sign Up</button>
    
    <div class="divider"><span>OR</span></div>
    
    <button class="btn-google" onclick="handleGoogleAuth()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
        Continue with Google
    </button>
</div>

<div class="container hidden" id="main-app">
    <div class="tab-buttons">
        <button onclick="showTab('notes')" id="btn-notes" class="active">Notes</button>
        <button onclick="showTab('passwords')" id="btn-pass">Passwords</button>
    </div>

    <div id="section-notes">
        <input type="text" id="note-title" placeholder="Note Title">
        <textarea id="note-body" rows="3" placeholder="Write something..."></textarea>
        <button class="btn-primary" onclick="saveData('notes')">Save Note</button>
        <div id="notes-list"></div>
    </div>

    <div id="section-passwords" class="hidden">
        <input type="text" id="site-name" placeholder="Website/App Name">
        <input type="text" id="site-pass" placeholder="Password">
        <button class="btn-primary" onclick="saveData('passwords')">Save Password</button>
        <div id="pass-list"></div>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBt8gP3y2M3tjabKwjNfiotgqmxmhIq7cI",
        authDomain: "encryption-cb1d7.firebaseapp.com",
        projectId: "encryption-cb1d7",
        storageBucket: "encryption-cb1d7.firebasestorage.app",
        messagingSenderId: "341148500717",
        appId: "1:341148500717:web:08c39bd1dbd2b672ab42e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    let currentUser = null;

    // --- Authentication Logic ---

    // Email Auth
    window.handleEmailAuth = async () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        if(!email || !pass) return alert("Fill all fields");

        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (error) {
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                try { await createUserWithEmailAndPassword(auth, email, pass); } 
                catch (e) { alert(e.message); }
            } else { alert(error.message); }
        }
    };

    // Google Auth
    window.handleGoogleAuth = async () => {
        try { await signInWithPopup(auth, provider); } 
        catch (error) { alert(error.message); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, user => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            loadData('notes');
            loadData('passwords');
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    // --- Data Logic ---

    window.saveData = async (type) => {
        const data = type === 'notes' ? {
            title: document.getElementById('note-title').value,
            body: document.getElementById('note-body').value
        } : {
            site: document.getElementById('site-name').value,
            pass: document.getElementById('site-pass').value
        };

        if(Object.values(data).some(v => !v)) return alert("Please fill fields");

        try {
            await addDoc(collection(db, type), {
                ...data,
                uid: currentUser.uid,
                createdAt: Date.now()
            });
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        } catch (e) { alert("Error saving: " + e.message); }
    };

    function loadData(type) {
        const q = query(collection(db, type), where("uid", "==", currentUser.uid));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById(type === 'notes' ? 'notes-list' : 'pass-list');
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const item = doc.data();
                const div = document.createElement('div');
                div.className = `card ${type === 'passwords' ? 'pass-card' : ''}`;
                div.innerHTML = type === 'notes' ? 
                    `<b>${item.title}</b><p>${item.body}</p>` : 
                    `<b>Site:</b> ${item.site} <br> <b>Pass:</b> <code>${item.pass}</code>`;
                list.appendChild(div);
            });
        });
    }

    window.showTab = (tab) => {
        document.getElementById('section-notes').classList.toggle('hidden', tab !== 'notes');
        document.getElementById('section-passwords').classList.toggle('hidden', tab !== 'passwords');
        document.getElementById('btn-notes').classList.toggle('active', tab === 'notes');
        document.getElementById('btn-pass').classList.toggle('active', tab === 'passwords');
    };
</script>

</body>
</html>
