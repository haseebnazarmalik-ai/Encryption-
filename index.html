<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMS Multi-Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Styles */
        :root {
            --wa-green: #075E54;
            --wa-teal: #128C7E;
            --wa-light-green: #25D366;
            --wa-bg: #e5ddd5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--wa-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        /* Login Screen */
        #login-screen {
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .login-card {
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        #google-login-btn {
            background: #4285F4;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        /* Header & WhatsApp UI */
        header {
            background: var(--wa-green);
            color: white;
            padding-top: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
        }

        .user-profile { display: flex; align-items: center; gap: 10px; }
        .user-profile img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid white; }

        .tabs {
            display: flex;
            width: 100%;
            margin-top: 10px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            opacity: 1;
            border-bottom: 3px solid white;
        }

        /* Content Area */
        #main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 100px;
            display: flex;
            transition: transform 0.3s ease;
        }

        .tab-page {
            min-width: 100%;
            display: none;
        }

        .tab-page.active { display: block; }

        /* Message Bubbles (WhatsApp Style) */
        .message-card {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            max-width: 90%;
        }

        .time-stamp {
            font-size: 10px;
            color: #888;
            display: block;
            text-align: right;
            margin-top: 5px;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            border-top: 1px solid #eee;
            padding-top: 5px;
        }

        .btn-done { color: var(--wa-teal); cursor: pointer; border: none; background: none; font-weight: bold; }
        .btn-delete { color: #e74c3c; cursor: pointer; border: none; background: none; }

        /* Input Areas */
        .input-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #f0f0f0;
            padding: 10px;
            display: flex;
            box-sizing: border-box;
            gap: 10px;
        }

        .input-bar input, .input-bar textarea {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
        }

        .send-btn {
            background: var(--wa-teal);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Password Specific */
        .pass-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <i class="fab fa-whatsapp" style="font-size: 60px; color: var(--wa-light-green);"></i>
            <h2>GMS Smart Tracker</h2>
            <p>Please login to continue</p>
            <button id="google-login-btn"><i class="fab fa-google"></i> Sign in with Google</button>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden">
        <header>
            <div class="top-bar">
                <div id="user-display-name" style="font-weight: bold;">User Name</div>
                <div class="user-profile">
                    <img id="user-photo" src="" alt="DP">
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('queries', 0)">QUERIES</div>
                <div class="tab" onclick="switchTab('passwords', 1)">PASSWORDS</div>
                <div class="tab" onclick="switchTab('notes', 2)">NOTES</div>
            </div>
        </header>

        <main id="main-content">
            <div id="queries-page" class="tab-page active">
                <div id="queries-list"></div>
                <div class="input-bar">
                    <input type="text" id="query-input" placeholder="Type a query...">
                    <button class="send-btn" onclick="saveData('queries')"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="passwords-page" class="tab-page">
                <div id="passwords-list"></div>
                <div class="input-bar" style="height: auto; flex-direction: column;">
                    <div class="pass-input-group">
                        <input type="text" id="pass-title" placeholder="Service Name (e.g. Gmail)">
                        <input type="text" id="pass-val" placeholder="Password">
                        <input type="text" id="pass-note" placeholder="Short note">
                    </div>
                    <button onclick="saveData('passwords')" style="background: var(--wa-teal); color: white; border: none; padding: 10px; border-radius: 5px;">Save Password</button>
                </div>
            </div>

            <div id="notes-page" class="tab-page">
                <div id="notes-list"></div>
                <div class="input-bar">
                    <input type="text" id="note-input" placeholder="Write a note...">
                    <button class="send-btn" onclick="saveData('notes')"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBt8gP3y2M3tjabKwjNfiotgqmxmhIq7cI",
            authDomain: "encryption-cb1d7.firebaseapp.com",
            databaseURL: "https://encryption-cb1d7-default-rtdb.firebaseio.com",
            projectId: "encryption-cb1d7",
            storageBucket: "encryption-cb1d7.firebasestorage.app",
            messagingSenderId: "341148500717",
            appId: "1:341148500717:web:08c39bd1dbd2b672ab42e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // --- AUTH LOGIC ---
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                document.getElementById('user-display-name').innerText = user.displayName;
                document.getElementById('user-photo').src = user.photoURL;
                initApp(user.uid);
            }
        });

        // --- TAB SWITCHING ---
        window.switchTab = (tabName, index) => {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.tab-page').forEach(page => {
                page.classList.toggle('active', page.id === tabName + '-page');
            });
        }

        // --- DATA LOGIC ---
        function initApp(uid) {
            const paths = ['queries', 'passwords', 'notes'];
            paths.forEach(path => {
                // Load from LocalStorage first (Offline Support)
                const cached = localStorage.getItem(`cache_${uid}_${path}`);
                if (cached) render(path, JSON.parse(cached));

                // Sync from Firebase Realtime DB
                onValue(ref(db, `users/${uid}/${path}`), (snapshot) => {
                    const data = snapshot.val() || {};
                    localStorage.setItem(`cache_${uid}_${path}`, JSON.stringify(data));
                    render(path, data);
                });
            });
        }

        window.saveData = (path) => {
            const uid = auth.currentUser.uid;
            let payload = { timestamp: new Date().toLocaleString() };

            if (path === 'queries') {
                const val = document.getElementById('query-input').value;
                if (!val) return;
                payload.text = val;
                document.getElementById('query-input').value = '';
            } else if (path === 'notes') {
                const val = document.getElementById('note-input').value;
                if (!val) return;
                payload.text = val;
                document.getElementById('note-input').value = '';
            } else if (path === 'passwords') {
                const title = document.getElementById('pass-title').value;
                const pass = document.getElementById('pass-val').value;
                const note = document.getElementById('pass-note').value;
                if (!title || !pass) return;
                payload = { ...payload, title, pass, note };
                document.getElementById('pass-title').value = '';
                document.getElementById('pass-val').value = '';
                document.getElementById('pass-note').value = '';
            }

            const newRef = push(ref(db, `users/${uid}/${path}`));
            set(newRef, payload);
        };

        window.deleteItem = (path, key) => {
            if(confirm("Are you sure?")) {
                remove(ref(db, `users/${auth.currentUser.uid}/${path}/${key}`));
            }
        };

        function render(path, data) {
            const list = document.getElementById(`${path}-list`);
            list.innerHTML = '';
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                const div = document.createElement('div');
                div.className = 'message-card';

                if (path === 'queries') {
                    div.innerHTML = `<div>${item.text}</div>
                        <span class="time-stamp">${item.timestamp}</span>
                        <div class="action-btns"><button class="btn-done" onclick="deleteItem('queries','${key}')">✔ Done</button></div>`;
                } 
                else if (path === 'notes') {
                    div.innerHTML = `<div>${item.text}</div>
                        <span class="time-stamp">${item.timestamp}</span>
                        <div class="action-btns"><button class="btn-delete" onclick="deleteItem('notes','${key}')"><i class="fas fa-trash"></i> Delete</button></div>`;
                }
                else if (path === 'passwords') {
                    div.innerHTML = `<strong>${item.title}</strong>
                        <div id="p-box-${key}" style="margin: 5px 0;">Password: ••••••••</div>
                        <div style="font-size:12px; color: #666;">Note: ${item.note}</div>
                        <span class="time-stamp">${item.timestamp}</span>
                        <div class="action-btns">
                            <button class="btn-done" onclick="document.getElementById('p-box-${key}').innerText='Password: ${item.pass}'"><i class="fas fa-eye"></i> View</button>
                            <button class="btn-delete" onclick="deleteItem('passwords','${key}')">Delete</button>
                        </div>`;
                }
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
