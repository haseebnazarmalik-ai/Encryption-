<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GMS Multi-Tracker Pro | V1.5</title>
    
    <meta name="theme-color" content="#075E54">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --wa-green: #075E54;
            --wa-teal: #128C7E;
            --wa-light-green: #25D366;
            --wa-bg: #e5ddd5;
            --white: #ffffff;
            --bubble-in: #ffffff;
            --bubble-out: #dcf8c6;
            --text-main: #303030;
            --text-sec: #808080;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--wa-bg);
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        /* Instant Loader */
        #instant-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 30000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Login Screen */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 20000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .login-card { text-align: center; padding: 40px; }
        #google-login-btn {
            background: #4285F4; color: white; border: none; padding: 15px 30px;
            font-size: 16px; border-radius: 30px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 10px; margin-top: 20px;
        }

        /* Header */
        header { background: var(--wa-green); color: white; flex-shrink: 0; z-index: 100; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
        .app-title { font-size: 20px; font-weight: 500; }
        #user-photo { width: 38px; height: 38px; border-radius: 50%; border: 2px solid white; }

        /* Tabs */
        .tabs-container { display: flex; background: var(--wa-green); position: relative; }
        .tab { flex: 1; text-align: center; padding: 15px 0; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; text-transform: uppercase; cursor: pointer; }
        .tab.active { color: white; }
        .tab-indicator { position: absolute; bottom: 0; left: 0; height: 3px; background: white; width: 33.33%; transition: transform 0.3s; }

        /* Swiper & Slides */
        .swiper { width: 100%; flex: 1; }
        .swiper-slide { height: 100%; overflow-y: auto; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; }

        /* Search & Input Area */
        .sticky-controls {
            background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
        }
        .wa-input {
            width: 100%; border: 1px solid #ddd; padding: 12px; border-radius: 8px;
            outline: none; font-size: 15px; box-sizing: border-box;
        }
        .btn-row { display: flex; gap: 10px; }
        .action-btn {
            flex: 1; background: var(--wa-teal); color: white; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        /* Data Bubbles (WhatsApp Style) */
        .data-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .bubble {
            padding: 12px 15px; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            max-width: 85%; position: relative; font-size: 15px;
        }
        .bubble.out { background: var(--bubble-out); align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble.in { background: var(--bubble-in); align-self: flex-start; border-bottom-left-radius: 2px; }
        .bubble-meta { font-size: 10px; color: var(--text-sec); display: block; text-align: right; margin-top: 5px; }

        /* Password Specific */
        .pass-card-title { font-weight: bold; color: var(--wa-green); border-bottom: 1px solid #eee; margin-bottom: 8px; display: block; }
        .cred-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #f7f7f7; padding: 8px; border-radius: 6px; margin: 4px 0;
        }
        .cred-val { font-family: monospace; color: #444; }
        .copy-icon { color: var(--wa-teal); cursor: pointer; padding: 5px; }

        /* Utils */
        .del-link { color: #e74c3c; font-size: 11px; text-align: right; cursor: pointer; margin-top: 8px; display: block; font-weight: bold; }

    </style>
</head>
<body>

    <div id="instant-loader">
        <div style="width:40px; height:40px; border:4px solid #f3f3f3; border-top:4px solid #128C7E; border-radius:50%; animation:spin 1s linear infinite;"></div>
    </div>

    <div id="login-screen" class="hidden">
        <div class="login-card">
            <i class="fab fa-whatsapp" style="font-size: 70px; color: var(--wa-light-green);"></i>
            <h2 style="margin-top:15px;">GMS Smart Tracker</h2>
            <p style="color:#666;">Sync your technical logs instantly</p>
            <button id="google-login-btn"><i class="fab fa-google"></i> Login with Google</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <div class="top-bar">
                <div class="app-title">GMS Tracker</div>
                <img id="user-photo" src="" alt="">
            </div>
            <div class="tabs-container">
                <div class="tab active" onclick="jumpTo(0)">Queries</div>
                <div class="tab" onclick="jumpTo(1)">Passwords</div>
                <div class="tab" onclick="jumpTo(2)">Notes</div>
                <div id="tab-line" class="tab-indicator"></div>
            </div>
        </header>

        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <div class="sticky-controls">
                        <input type="text" id="q-input" class="wa-input" placeholder="Type new query...">
                        <button class="action-btn" onclick="saveToFirebase('queries')"><i class="fas fa-paper-plane"></i> SEND QUERY</button>
                    </div>
                    <div id="list-queries" class="data-list"></div>
                </div>

                <div class="swiper-slide">
                    <div class="sticky-controls">
                        <input type="text" id="p-site" class="wa-input" placeholder="Device/Service Name">
                        <input type="text" id="p-user" class="wa-input" placeholder="Username/Email">
                        <input type="text" id="p-pass" class="wa-input" placeholder="Password">
                        <button class="action-btn" onclick="saveToFirebase('passwords')"><i class="fas fa-shield-alt"></i> SAVE CREDENTIALS</button>
                    </div>
                    <div id="list-passwords" class="data-list"></div>
                </div>

                <div class="swiper-slide">
                    <div class="sticky-controls">
                        <textarea id="n-input" class="wa-input" style="height:70px; resize:none;" placeholder="Quick technical note..."></textarea>
                        <button class="action-btn" onclick="saveToFirebase('notes')"><i class="fas fa-plus"></i> ADD NOTE</button>
                    </div>
                    <div id="list-notes" class="data-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBt8gP3y2M3tjabKwjNfiotgqmxmhIq7cI",
            authDomain: "encryption-cb1d7.firebaseapp.com",
            databaseURL: "https://encryption-cb1d7-default-rtdb.firebaseio.com",
            projectId: "encryption-cb1d7",
            storageBucket: "encryption-cb1d7.firebasestorage.app",
            messagingSenderId: "341148500717",
            appId: "1:341148500717:web:08c39bd1dbd2b672ab42e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let swiper, uid;

        // INSTANT LOGIN LOGIC: Check LocalStorage first to hide login screen immediately
        if(localStorage.getItem('gms_logged')) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        onAuthStateChanged(auth, (user) => {
            document.getElementById('instant-loader').classList.add('hidden');
            if (user) {
                uid = user.uid;
                localStorage.setItem('gms_logged', 'true');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-photo').src = user.photoURL;
                
                if(!swiper) {
                    swiper = new Swiper('.swiper', {
                        speed: 300,
                        on: { slideChange: () => syncTabs(swiper.activeIndex) }
                    });
                }
                ['queries', 'passwords', 'notes'].forEach(p => syncPath(p));
            } else {
                localStorage.removeItem('gms_logged');
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);
        window.jumpTo = (idx) => swiper.slideTo(idx);

        function syncTabs(idx) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.getElementById('tab-line').style.transform = `translateX(${idx * 100}%)`;
        }

        function syncPath(path) {
            const cache = localStorage.getItem(`cache_${uid}_${path}`);
            if(cache) render(path, JSON.parse(cache));
            onValue(ref(db, `users/${uid}/${path}`), (s) => {
                const data = s.val() || {};
                localStorage.setItem(`cache_${uid}_${path}`, JSON.stringify(data));
                render(path, data);
            });
        }

        window.saveToFirebase = (path) => {
            let data = { ts: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), dt: new Date().toLocaleDateString('en-GB') };
            if(path === 'queries') { data.val = document.getElementById('q-input').value; document.getElementById('q-input').value = ''; }
            else if(path === 'notes') { data.val = document.getElementById('n-input').value; document.getElementById('n-input').value = ''; }
            else {
                data.s = document.getElementById('p-site').value; 
                data.u = document.getElementById('p-user').value; 
                data.p = document.getElementById('p-pass').value;
                document.getElementById('p-site').value = ''; document.getElementById('p-user').value = ''; document.getElementById('p-pass').value = '';
            }
            if(data.val || data.s) push(ref(db, `users/${uid}/${path}`), data);
        }

        window.removeItem = (path, key) => confirm("Delete permanently?") && remove(ref(db, `users/${uid}/${path}/${key}`));

        function render(path, data) {
            const list = document.getElementById(`list-${path}`);
            list.innerHTML = '';
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                const bubble = document.createElement('div');
                bubble.className = `bubble ${path === 'queries' ? 'out' : 'in'}`;
                
                if(path === 'passwords') {
                    bubble.innerHTML = `
                        <span class="pass-card-title">${item.s}</span>
                        <div class="cred-row"><span class="cred-val" id="u-${key}">${item.u}</span><i class="fas fa-copy copy-icon" onclick="cp('u-${key}')"></i></div>
                        <div class="cred-row"><span class="cred-val" id="p-${key}">••••••••</span>
                            <div style="display:flex;"><i class="fas fa-eye copy-icon" style="color:#999" onclick="sh('${key}','${item.p}')"></i><i class="fas fa-key copy-icon" onclick="cp_raw('${item.p}')"></i></div>
                        </div>
                        <span class="bubble-meta">${item.dt} • ${item.ts}</span>
                        <span class="del-link" onclick="removeItem('passwords','${key}')">DELETE</span>`;
                } else {
                    bubble.innerHTML = `<div style="white-space:pre-wrap;">${item.val}</div>
                        <span class="bubble-meta">${item.dt} • ${item.ts}</span>
                        <span class="del-link" style="color:${path==='queries'?'#128C7E':'#e74c3c'}" onclick="removeItem('${path}','${key}')">${path==='queries'?'DONE':'DELETE'}</span>`;
                }
                list.appendChild(bubble);
            });
        }

        window.sh = (k, v) => { const e = document.getElementById(`p-${k}`); e.innerText = (e.innerText==='••••••••') ? v : '••••••••'; }
        window.cp = (id) => { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("Copied!"); }
        window.cp_raw = (v) => { navigator.clipboard.writeText(v); alert("Password Copied!"); }

    </script>
    <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
