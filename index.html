<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GMS Multi-Tracker | V4.7 Import Ready</title>
    
    <meta name="theme-color" content="#075E54">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --wa-green: #075E54;
            --wa-teal: #128C7E;
            --wa-bg: #e5ddd5;
            --white: #ffffff;
            --text-main: #111b21;
            --text-muted: #667781;
            --danger: #ff4757;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--wa-bg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        header { background: var(--wa-green); color: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; }
        
        .user-profile { display: flex; align-items: center; gap: 10px; }
        #u-name { font-size: 14px; font-weight: 500; color: #fff; }
        #u-pic { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid white; background: #eee; object-fit: cover; }

        .tab-strip { display: flex; background: var(--wa-green); position: relative; }
        .tab-item { flex: 1; text-align: center; padding: 16px 0; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; cursor: pointer; z-index: 2; }
        .tab-item.active { color: white; }
        .tab-indicator { position: absolute; bottom: 0; left: 0; height: 4px; background: white; width: 33.33%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }

        .search-area { background: white; padding: 12px 15px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .search-wrapper { flex: 1; display: flex; align-items: center; background: #f0f2f5; padding: 2px 15px; border-radius: 30px; }
        .search-box { flex: 1; background: transparent; border: none; padding: 10px; font-size: 14px; }

        .content-section { display: none; width: 100%; max-width: 800px; margin: 0 auto; padding: 10px; }
        .content-section.active { display: block; }

        .input-panel { background: white; padding: 15px; box-shadow: var(--shadow); margin: 10px 0; border-radius: 15px; }
        .wa-input { width: 100%; border: 1px solid #e9edef; padding: 12px; border-radius: 8px; font-size: 15px; margin-bottom: 10px; }
        .send-btn { width: 100%; background: var(--wa-teal); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .send-btn:active { transform: scale(0.98); background: var(--wa-green); }

        .bubble { width: 96%; margin: 8px auto; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); background: var(--white); position: relative; }
        .pass-site { font-weight: 700; color: var(--wa-green); display: block; font-size: 18px; margin-bottom: 8px; border-bottom: 1px solid #f1f1f1; padding-bottom: 5px;}
        
        .cred-box { background: #f8f9fa; border-radius: 8px; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: none; border: none; color: var(--wa-teal); cursor: pointer; font-size: 18px; padding: 5px; }

        .b-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .btn-delete { background: #fff5f5; color: var(--danger); border: 1px solid #ffe3e3; padding: 8px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; cursor: pointer; }

        #custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; display: none; align-items: flex-end; }
        .modal-box { background: white; width: 100%; padding: 25px; border-radius: 25px 25px 0 0; animation: slideUp 0.3s ease-out; text-align: center; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-btns { display: flex; gap: 15px; margin-top: 20px; }
        .m-btn { flex: 1; padding: 15px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; }
        .m-confirm { background: var(--danger); color: white; }
        .m-cancel { background: #f0f2f5; color: var(--text-main); }

        #login-screen { position: fixed; inset: 0; background: #f0f2f5; z-index: 9000; display: flex; justify-content: center; align-items: center; }
        
        /* New Import Style */
        .import-label { background: #eceff1; padding: 8px 12px; border-radius: 20px; font-size: 12px; color: #455a64; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div id="login-screen" class="hidden">
        <div style="background:white; padding:40px; border-radius:24px; text-align:center; width:85%; max-width:400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <i class="fab fa-whatsapp" style="font-size:60px; color:var(--wa-teal);"></i>
            <h2 style="margin: 20px 0;">GMS Tracker</h2>
            <button id="btn-google" class="send-btn" style="background:#4285F4;">SIGN IN WITH GOOGLE</button>
        </div>
    </div>

    <div id="app-ui">
        <header>
            <div class="top-bar">
                <div style="font-size: 20px; font-weight: 700;">GMS Tracker</div>
                <div class="user-profile">
                    <span id="u-name">...</span>
                    <img id="u-pic" src="" alt="">
                </div>
            </div>
            <div class="tab-strip">
                <div class="tab-item active" onclick="nav('queries', 0)">Queries</div>
                <div class="tab-item" onclick="nav('passwords', 1)">Passwords</div>
                <div class="tab-item" onclick="nav('notes', 2)">Notes</div>
                <div id="tab-mark" class="tab-indicator"></div>
            </div>
        </header>

        <div class="search-area">
            <div class="search-wrapper">
                <i class="fas fa-search" style="color:var(--text-muted);"></i>
                <input type="text" id="master-search" class="search-box" placeholder="Instant Search...">
            </div>
            <button onclick="exportExcel()" style="border:none; background:#1d6f42; color:white; border-radius:50%; width:35px; height:35px;" title="Export Excel"><i class="fas fa-file-excel"></i></button>
            
            <input type="file" id="csv-file" class="hidden" accept=".csv, .xlsx">
            <button onclick="document.getElementById('csv-file').click()" style="border:none; background:var(--wa-teal); color:white; border-radius:50%; width:35px; height:35px;" title="Import Chrome CSV"><i class="fas fa-file-import"></i></button>
        </div>

        <div id="sec-queries" class="content-section active">
            <div class="input-panel">
                <input type="text" id="in-q" class="wa-input" placeholder="Enter task or query...">
                <button class="send-btn" onclick="saveData('queries')">SAVE TO CLOUD</button>
            </div>
            <div id="list-queries"></div>
        </div>

        <div id="sec-passwords" class="content-section">
            <div class="input-panel">
                <input type="text" id="p-s" class="wa-input" placeholder="Site Name">
                <input type="text" id="p-u" class="wa-input" placeholder="Username">
                <input type="text" id="p-p" class="wa-input" placeholder="Password">
                <button class="send-btn" onclick="saveData('passwords')">SAVE SECURELY</button>
                <p style="font-size:10px; color:gray; margin-top:10px; text-align:center;">Tip: Use the Import icon above to bulk upload Chrome passwords.</p>
            </div>
            <div id="list-passwords"></div>
        </div>

        <div id="sec-notes" class="content-section">
            <div class="input-panel">
                <textarea id="in-n" class="wa-input" style="height:80px; resize:none;" placeholder="Technical notes..."></textarea>
                <button class="send-btn" onclick="saveData('notes')">ADD NOTE</button>
            </div>
            <div id="list-notes"></div>
        </div>
    </div>

    <div id="custom-modal">
        <div class="modal-box">
            <div style="font-size: 40px; color: var(--danger); margin-bottom: 10px;"><i class="fas fa-trash-can"></i></div>
            <h3 style="margin:0;">Delete Record?</h3>
            <div class="modal-btns">
                <button class="m-btn m-cancel" onclick="closeModal()">CANCEL</button>
                <button id="modal-confirm-btn" class="m-btn m-confirm">DELETE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBt8gP3y2M3tjabKwjNfiotgqmxmhIq7cI",
            authDomain: "encryption-cb1d7.firebaseapp.com",
            databaseURL: "https://encryption-cb1d7-default-rtdb.firebaseio.com",
            projectId: "encryption-cb1d7",
            storageBucket: "encryption-cb1d7.firebasestorage.app",
            messagingSenderId: "341148500717",
            appId: "1:341148500717:web:08c39bd1dbd2b672ab42e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let uid, currentTab = 'queries', deleteInfo = null;
        let memory = { queries: {}, passwords: {}, notes: {} };

        // --- IMPORT LOGIC ---
        document.getElementById('csv-file').addEventListener('change', function(e) {
            if(!uid) return alert("Please Login First");
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                
                let count = 0;
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const date = new Date().toLocaleDateString('en-GB');

                jsonData.forEach(row => {
                    // Mapping columns from Chrome CSV: name -> site, username -> user, password -> pass
                    if(row.name && row.password) {
                        const obj = {
                            site: row.name || "Unknown Site",
                            user: row.username || "N/A",
                            pass: row.password || "",
                            date: date,
                            time: time
                        };
                        push(ref(db, `users/${uid}/passwords`), obj);
                        count++;
                    }
                });
                alert(`Successfully imported ${count} passwords!`);
                e.target.value = ''; // Reset input
            };
            reader.readAsArrayBuffer(file);
        });

        // --- CORE FUNCTIONS ---
        window.saveData = (path) => {
            if(!uid) return alert("Please Wait... Authenticating");
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const date = new Date().toLocaleDateString('en-GB');
            let obj = { time, date };

            if(path === 'queries') {
                const el = document.getElementById('in-q');
                if(!el.value.trim()) return;
                obj.val = el.value; el.value = '';
            } else if(path === 'notes') {
                const el = document.getElementById('in-n');
                if(!el.value.trim()) return;
                obj.val = el.value; el.value = '';
            } else if(path === 'passwords') {
                const s = document.getElementById('p-s'), u = document.getElementById('p-u'), p = document.getElementById('p-p');
                if(!s.value.trim()) return;
                obj.site = s.value; obj.user = u.value; obj.pass = p.value;
                s.value = ''; u.value = ''; p.value = '';
            }

            push(ref(db, `users/${uid}/${path}`), obj);
        };

        window.nav = (section, idx) => {
            currentTab = section;
            document.querySelectorAll('.tab-item').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`sec-${section}`).classList.add('active');
            document.getElementById('tab-mark').style.transform = `translateX(${idx * 100}%)`;
        };

        window.askDelete = (p, k) => { deleteInfo = { path: p, key: k }; document.getElementById('custom-modal').style.display = 'flex'; };
        window.closeModal = () => document.getElementById('custom-modal').style.display = 'none';
        document.getElementById('modal-confirm-btn').onclick = () => {
            if(deleteInfo) { remove(ref(db, `users/${uid}/${deleteInfo.path}/${deleteInfo.key}`)); closeModal(); }
        };

        function instantLoad() {
            const lastUid = localStorage.getItem('last_uid');
            const lastPic = localStorage.getItem('last_pic');
            const lastName = localStorage.getItem('last_name');
            if(lastPic) document.getElementById('u-pic').src = lastPic;
            if(lastName) document.getElementById('u-name').innerText = lastName;

            if(lastUid) {
                uid = lastUid;
                document.getElementById('login-screen').classList.add('hidden');
                ['queries', 'passwords', 'notes'].forEach(p => {
                    const local = localStorage.getItem(`gms_final_${uid}_${p}`);
                    if(local) { memory[p] = JSON.parse(local); render(p, memory[p]); }
                });
            }
        }
        instantLoad();

        setPersistence(auth, browserLocalPersistence).then(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    uid = user.uid;
                    const name = user.displayName.split(' ')[0];
                    const pic = user.photoURL;
                    localStorage.setItem('last_uid', uid);
                    localStorage.setItem('last_name', name);
                    localStorage.setItem('last_pic', pic);
                    document.getElementById('u-name').innerText = name;
                    document.getElementById('u-pic').src = pic;
                    document.getElementById('login-screen').classList.add('hidden');
                    startSync();
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            });
        });

        document.getElementById('btn-google').onclick = () => signInWithPopup(auth, provider);

        function startSync() {
            ['queries', 'passwords', 'notes'].forEach(path => {
                onValue(ref(db, `users/${uid}/${path}`), (snap) => {
                    const data = snap.val() || {};
                    memory[path] = data;
                    localStorage.setItem(`gms_final_${uid}_${path}`, JSON.stringify(data));
                    render(path, data);
                });
            });
        }

        function render(path, data) {
            const list = document.getElementById(`list-${path}`);
            if(!list) return;
            list.innerHTML = '';
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                const div = document.createElement('div');
                div.className = 'bubble';
                if(path === 'passwords') {
                    div.innerHTML = `<span class="pass-site"><i class="fas fa-lock"></i> ${item.site}</span>
                        <div class="cred-box"><span id="u-${key}">${item.user}</span><button class="copy-btn" onclick="cp('u-${key}')"><i class="fas fa-copy"></i></button></div>
                        <div class="cred-box"><span id="p-${key}">••••••••</span><div style="display:flex; gap:10px;">
                        <button class="copy-btn" style="color:#aaa" onclick="sh('${key}','${item.pass}')"><i class="fas fa-eye"></i></button>
                        <button class="copy-btn" onclick="cp_raw('${item.pass}')"><i class="fas fa-key"></i></button></div></div>
                        <div class="b-footer"><span class="b-meta">${item.date}</span><div class="btn-delete" onclick="askDelete('passwords','${key}')"><i class="fas fa-trash"></i> DELETE</div></div>`;
                } else {
                    div.innerHTML = `<div style="font-size:16px;">${item.val}</div><div class="b-footer"><span class="b-meta">${item.date}</span>
                        <div class="btn-delete" onclick="askDelete('${path}','${key}')"><i class="fas fa-trash"></i> DELETE</div></div>`;
                }
                list.appendChild(div);
            });
        }

        window.sh = (k, v) => { const e = document.getElementById(`p-${k}`); e.innerText = (e.innerText === '••••••••') ? v : '••••••••'; };
        window.cp = (id) => { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("Copied!"); };
        window.cp_raw = (v) => { navigator.clipboard.writeText(v); alert("Key Copied!"); };
        window.exportExcel = () => {
            const rows = Object.keys(memory[currentTab]).map(k => ({ ...memory[currentTab][k] }));
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Backup");
            XLSX.writeFile(wb, `GMS_Export.xlsx`);
        };
        document.getElementById('master-search').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = {};
            Object.keys(memory[currentTab]).forEach(k => { if(JSON.stringify(memory[currentTab][k]).toLowerCase().includes(term)) filtered[k] = memory[currentTab][k]; });
            render(currentTab, filtered);
        };
    </script>
</body>
</html>
